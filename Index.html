<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treino & Dieta - Evolução</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --accent: #ccff00; 
            --text: #ffffff; --text-dim: #a0a0a0; --check: #2ecc71;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        header { padding: 15px; border-bottom: 1px solid #333; text-align: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        h1 { font-size: 1rem; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }

        /* Seletor de Dias */
        .day-selector { display: flex; gap: 5px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .day-btn { background: #333; border: none; color: #fff; padding: 8px 15px; border-radius: 20px; white-space: nowrap; font-size: 0.8rem; cursor: pointer; }
        .day-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #333; }
        .card.done { border-color: var(--check); opacity: 0.7; }
        
        .row { display: flex; justify-content: space-between; align-items: center; }
        .info b { display: block; font-size: 0.95rem; }
        .info span { font-size: 0.8rem; color: var(--text-dim); }
        
        input[type="number"] { width: 65px; background: #333; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 5px; }
        .btn-check { background: none; border: 2px solid #444; border-radius: 50%; width: 30px; height: 30px; margin-left: 10px; display: flex; align-items: center; justify-content: center; color: transparent;}
        .done .btn-check { background: var(--check); border-color: var(--check); color: #000; }
        .done .btn-check::after { content: '✓'; font-weight: bold; }

        /* Relatórios */
        canvas { background: #1e1e1e; border-radius: 12px; padding: 10px; margin-top: 10px; }

        nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; border-top: 1px solid #333; }
        nav button { flex: 1; background: none; border: none; color: var(--text-dim); padding: 15px 0; font-size: 0.75rem; }
        nav button.active { color: var(--accent); }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1 id="view-title">Meu Treino</h1>
    <div id="day-nav" class="day-selector">
        <button onclick="changeDay(1)" class="day-btn" id="d1">SEG</button>
        <button onclick="changeDay(2)" class="day-btn" id="d2">TER</button>
        <button onclick="changeDay(3)" class="day-btn" id="d3">QUA</button>
        <button onclick="changeDay(4)" class="day-btn" id="d4">QUI</button>
        <button onclick="changeDay(5)" class="day-btn" id="d5">SEX</button>
        <button onclick="changeDay(6)" class="day-btn" id="d6">SÁB</button>
        <button onclick="changeDay(0)" class="day-btn" id="d0">DOM</button>
    </div>
</header>

<div class="container">
    <div id="tab-treino">
        <div id="treino-content"></div>
    </div>

    <div id="tab-dieta" class="hidden">
        <div class="card" style="text-align: center;">
            <div style="font-size: 1.2rem; margin-bottom: 10px;">💧 <span id="water-val">0</span> / 3.0L</div>
            <button onclick="addWater()" style="width:100%; padding:12px; border-radius:8px; background:#3498db; border:none; color:#fff; font-weight:bold;">+ Beber 250ml</button>
        </div>
        <div id="dieta-content"></div>
    </div>

    <div id="tab-relatorio" class="hidden">
        <h3>Evolução de Peso</h3>
        <div class="card">
            <input type="number" id="peso-input" step="0.1" placeholder="Peso Atual (kg)" style="width: 120px;">
            <button onclick="savePeso()" style="padding: 6px 15px; border-radius: 4px; background: var(--accent); border:none; font-weight:bold;">Registrar</button>
            <canvas id="weightChart"></canvas>
        </div>
        <h3>Consistência Semanal</h3>
        <p style="font-size: 0.8rem; color: var(--text-dim);">Checks realizados no treino e dieta.</p>
        <canvas id="statChart"></canvas>
    </div>
</div>

<nav>
    <button onclick="showTab('treino')" id="btn-treino" class="active">🏋️ TREINO</button>
    <button onclick="showTab('dieta')" id="btn-dieta">🍎 DIETA</button>
    <button onclick="showTab('relatorio')" id="btn-relatorio">📈 EVOLUÇÃO</button>
</nav>

<script>
    let currentDay = new Date().getDay();
    const dataTreinos = {
        0: { nome: "DOM: Descanso Ativo", exs: [{n: "Caminhada Leve", s: "40 min", t: ""}]},
        1: { nome: "SEG: Treino A (Empurrar)", exs: [{n: "Supino Inclinado", s: "4x10", t: ""},{n: "Supino Reto", s: "3x10", t: ""},{n: "Desenv. Militar", s: "4x10", t: ""},{n: "Elev. Lateral", s: "4x15", t: ""},{n: "Tríceps Testa", s: "3x12", t: ""},{n: "Abd Supra", s: "4x15", t: ""}]},
        2: { nome: "TER: Treino B (Puxar)", exs: [{n: "Terra", s: "3x8", t: ""},{n: "Puxada Aberta", s: "4x10", t: ""},{n: "Remada Cavalinho", s: "4x10", t: ""},{n: "Elev. Pélvica", s: "4x12", t: ""},{n: "Rosca Direta", s: "3x10", t: ""},{n: "Glúteo Coice", s: "3x15", t: ""}]},
        3: { nome: "QUA: Treino C (Pernas)", exs: [{n: "Agachamento", s: "4x10", t: ""},{n: "Leg Press", s: "4x10", t: ""},{n: "Flexora", s: "4x15", t: "Pausa 2s"},{n: "Extensora", s: "3x15", t: "Drop-set"},{n: "Stiff", s: "3x10", t: ""},{n: "Panturrilha", s: "5x20", t: ""}]},
        4: { nome: "QUI: Descanso Ativo", exs: [{n: "Caminhada/Bike", s: "60 min", t: ""}]},
        5: { nome: "SEX: Superior Completo", exs: [{n: "Supino Barra", s: "3x8", t: ""},{n: "Puxada Supinada", s: "3x10", t: ""},{n: "Desenv. Halter", s: "3x12", t: ""},{n: "Remada Baixa", s: "3x12", t: ""},{n: "Rosca Direta", s: "3x8", t: ""},{n: "Abd Completo", s: "3xFalha", t: ""}]},
        6: { nome: "SÁB: Inferior Completo", exs: [{n: "Agach. Sumô", s: "4x12", t: ""},{n: "Búlgaro", s: "3x12", t: ""},{n: "Adutora", s: "3x15", t: ""},{n: "Glúteo Máquina", s: "3x15", t: ""},{n: "Panturrilha", s: "4x20", t: ""}]}
    };

    const dataDieta = [
        {h: "Café", d: "2 fatias pão + 3 ovos"},
        {h: "Almoço", d: "100g Arroz + 70g Feijão + 150g Frango"},
        {h: "Lanche", d: "2 fatias pão + 100g Frango"},
        {h: "Jantar", d: "80g Arroz + 150g Frango ou 4 ovos"}
    ];

    function changeDay(d) {
        currentDay = d;
        loadTreino();
    }

    function showTab(tab) {
        ['tab-treino', 'tab-dieta', 'tab-relatorio'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(`tab-${tab}`).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${tab}`).classList.add('active');
        document.getElementById('day-nav').style.display = tab === 'treino' ? 'flex' : 'none';
        if(tab === 'relatorio') updateCharts();
    }

    function loadTreino() {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`d${currentDay}`).classList.add('active');
        const t = dataTreinos[currentDay];
        document.getElementById('view-title').innerText = t.nome;
        
        document.getElementById('treino-content').innerHTML = t.exs.map((ex, i) => `
            <div class="card ${localStorage.getItem(`t-${currentDay}-${i}`) ? 'done' : ''}" id="t-${currentDay}-${i}">
                <div class="row">
                    <div class="info" onclick="toggle('t-${currentDay}-${i}')">
                        <b>${ex.n}</b><span>${ex.s} ${ex.t ? `| ${ex.t}` : ''}</span>
                    </div>
                    <input type="number" value="${localStorage.getItem(`w-${currentDay}-${i}`)||''}" onchange="localStorage.setItem('w-${currentDay}-${i}', this.value)" placeholder="kg">
                    <div class="btn-check" onclick="toggle('t-${currentDay}-${i}')"></div>
                </div>
            </div>
        `).join('');
    }

    function loadDieta() {
        document.getElementById('dieta-content').innerHTML = dataDieta.map((r, i) => `
            <div class="card ${localStorage.getItem(`d-${i}`) ? 'done' : ''}" id="d-${i}">
                <div class="row">
                    <div class="info" onclick="toggle('d-${i}')"><b>${r.h}</b><span>${r.d}</span></div>
                    <div class="btn-check" onclick="toggle('d-${i}')"></div>
                </div>
            </div>
        `).join('');
    }

    function toggle(id) {
        const el = document.getElementById(id);
        el.classList.toggle('done');
        el.classList.contains('done') ? localStorage.setItem(id, 'true') : localStorage.removeItem(id);
    }

    function addWater() {
        let w = parseFloat(localStorage.getItem('water') || 0) + 0.25;
        localStorage.setItem('water', w);
        document.getElementById('water-val').innerText = w.toFixed(2);
    }

    function savePeso() {
        const p = document.getElementById('peso-input').value;
        if(!p) return;
        let historico = JSON.parse(localStorage.getItem('pesoHistory') || '[]');
        historico.push({ data: new Date().toLocaleDateString(), valor: p });
        localStorage.setItem('pesoHistory', JSON.stringify(historico));
        updateCharts();
    }

    function updateCharts() {
        const ctxW = document.getElementById('weightChart').getContext('2d');
        const hist = JSON.parse(localStorage.getItem('pesoHistory') || '[]');
        if(window.wChart) window.wChart.destroy();
        window.wChart = new Chart(ctxW, {
            type: 'line',
            data: {
                labels: hist.map(h => h.data),
                datasets: [{ label: 'Peso (kg)', data: hist.map(h => h.valor), borderColor: '#ccff00', tension: 0.3 }]
            }
        });
    }

    loadTreino(); loadDieta();
    document.getElementById('water-val').innerText = parseFloat(localStorage.getItem('water')||0).toFixed(2);
</script>
</body>
</html>
