<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treino & Dieta - André</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #ccff00; /* Verde Neon */
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --check: #2ecc71;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        header { padding: 20px; border-bottom: 1px solid #333; text-align: center; }
        h1 { font-size: 1.2rem; color: var(--accent); margin: 0; text-transform: uppercase; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .section-title { font-size: 1rem; margin: 20px 0 10px; border-left: 4px solid var(--accent); padding-left: 10px; }

        /* Cards Estilo */
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #333; transition: 0.3s; }
        .card.done { opacity: 0.5; border-color: var(--check); }
        
        .row { display: flex; justify-content: space-between; align-items: center; }
        .info { flex: 1; }
        .info b { display: block; font-size: 1rem; }
        .info span { font-size: 0.85rem; color: var(--text-dim); }
        .tip { font-style: italic; font-size: 0.75rem; color: var(--accent); margin-top: 4px; display: block; }

        /* Inputs de Carga e Checks */
        input[type="number"] { width: 60px; background: #333; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 5px; text-align: center; }
        .btn-check { background: none; border: 2px solid #444; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; color: transparent; margin-left: 10px; }
        .done .btn-check { background: var(--check); border-color: var(--check); color: #000; display: flex; align-items: center; justify-content: center; }
        .done .btn-check::after { content: '✓'; font-weight: bold; }

        /* Menu Inferior */
        nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; border-top: 1px solid #333; z-index: 100; }
        nav button { flex: 1; background: none; border: none; color: var(--text-dim); padding: 15px 0; font-size: 0.8rem; cursor: pointer; }
        nav button.active { color: var(--accent); font-weight: bold; }

        .hidden { display: none; }
        #water-counter { text-align: center; font-size: 1.5rem; margin: 10px 0; color: #3498db; }
    </style>
</head>
<body>

<header>
    <h1 id="current-day-title">Meus Treinos</h1>
</header>

<div class="container">
    <div id="tab-treino">
        <div id="treino-content"></div>
    </div>

    <div id="tab-dieta" class="hidden">
        <div id="water-counter">💧 <span id="water-val">0</span> / 3.0L</div>
        <button onclick="addWater()" style="width:100%; padding:10px; border-radius:8px; background:#3498db; border:none; color:#fff; margin-bottom:20px;">+ Bebi 250ml</button>
        <div id="dieta-content"></div>
    </div>
</div>

<nav>
    <button onclick="showTab('treino')" id="btn-treino" class="active">🏋️ TREINO</button>
    <button onclick="showTab('dieta')" id="btn-dieta">🍎 DIETA</button>
</nav>

<script>
    const dataTreinos = {
        0: { nome: "Descanso Ativo", exercicios: [{n: "Caminhada ou Bike Leve", s: "40-60 min", t: "Recuperação"}] },
        1: { nome: "Segunda: Treino A + ABD", exercicios: [
            {n: "Supino Inclinado (Halteres)", s: "4 x 10", t: ""},
            {n: "Supino Reto (Halteres)", s: "3 x 8-10", t: ""},
            {n: "Desenvolvimento Militar", s: "4 x 10", t: ""},
            {n: "Elevação Lateral", s: "4 x 15", t: "Dica: Falha na última!"},
            {n: "Tríceps Testa", s: "3 x 12", t: ""},
            {n: "Abdômen Supra (Carga)", s: "4 x 15-20", t: ""},
            {n: "Cardio: Caminhada Acelerada", s: "20 min", t: ""}
        ]},
        2: { nome: "Terça: Treino B + GLÚTEO", exercicios: [
            {n: "Levantamento Terra", s: "3 x 6-8", t: "Foco no Core"},
            {n: "Puxada Alta (Aberta)", s: "4 x 10", t: ""},
            {n: "Remada Cavalinho", s: "4 x 10", t: ""},
            {n: "Elevação Pélvica", s: "4 x 10-12", t: "Foco total Glúteo"},
            {n: "Rosca Direta (Barra W)", s: "3 x 10", t: ""},
            {n: "Glúteo Coice (Polia)", s: "3 x 15 (cada)", t: ""},
            {n: "Cardio: Elíptico/Bike", s: "20 min", t: ""}
        ]},
        3: { nome: "Quarta: Treino C + ABD (Pernas)", exercicios: [
            {n: "Agachamento Livre", s: "4 x 8-10", t: ""},
            {n: "Leg Press 45°", s: "4 x 10", t: ""},
            {n: "Cadeira Flexora", s: "4 x 12-15", t: "Pausar 2s em baixo"},
            {n: "Cadeira Extensora", s: "3 x 15", t: "Drop-set na última"},
            {n: "Stiff", s: "3 x 10", t: "Foco Posterior"},
            {n: "Panturrilha em pé", s: "5 x 15-20", t: ""},
            {n: "Abdômen Rodinha", s: "3 x Falha", t: ""}
        ]},
        4: { nome: "Quinta: Descanso Ativo", exercicios: [{n: "Caminhada ao ar livre", s: "40-60 min", t: ""}] },
        5: { nome: "Sexta: Superior + ABD", exercicios: [
            {n: "Supino Reto (Barra)", s: "3 x 8", t: ""},
            {n: "Puxada Supinada", s: "3 x 10", t: ""},
            {n: "Remada Baixa (Triângulo)", s: "3 x 12", t: ""},
            {n: "Rosca Direta", s: "3 x 8", t: "Carga para força"},
            {n: "Abdômen Completo", s: "3 x Falha", t: ""},
            {n: "Cardio: HIIT Esteira", s: "20 min", t: "1min rápido / 1min devagar"}
        ]},
        6: { nome: "Sábado: Inferior Completo", exercicios: [
            {n: "Agachamento Sumô", s: "4 x 10-12", t: "Adutores e Glúteo"},
            {n: "Agachamento Búlgaro", s: "3 x 12 (cada)", t: ""},
            {n: "Cadeira Adutora", s: "3 x 15", t: ""},
            {n: "Glúteo Coice (Máquina)", s: "3 x 12-15", t: ""},
            {n: "Panturrilha Sentado", s: "4 x 20", t: ""},
            {n: "Cardio: Moderado", s: "20 min", t: ""}
        ]}
    };

    const dataDieta = [
        {h: "Café da Manhã", d: "2 fatias pão + 3 ovos inteiros", p: "18g Prot"},
        {h: "Almoço", d: "100g Arroz + 70g Feijão + 150g Frango + Salada", p: "45g Prot"},
        {h: "Lanche (Pré-Treino)", d: "2 fatias pão + 100g Frango", p: "30g Prot"},
        {h: "Jantar (Pós-Treino)", d: "80g Arroz + 150g Frango ou 4 ovos + Legumes", p: "45g/24g Prot"}
    ];

    function showTab(tab) {
        document.getElementById('tab-treino').classList.toggle('hidden', tab !== 'treino');
        document.getElementById('tab-dieta').classList.toggle('hidden', tab !== 'dieta');
        document.getElementById('btn-treino').classList.toggle('active', tab === 'treino');
        document.getElementById('btn-dieta').classList.toggle('active', tab === 'dieta');
    }

    function loadContent() {
        const diaSemana = new Date().getDay(); 
        const treinoHj = dataTreinos[diaSemana];
        document.getElementById('current-day-title').innerText = treinoHj.nome;

        const treinoDiv = document.getElementById('treino-content');
        treinoDiv.innerHTML = treinoHj.exercicios.map((ex, i) => `
            <div class="card" id="t-${diaSemana}-${i}">
                <div class="row">
                    <div class="info" onclick="toggleDone('t-${diaSemana}-${i}')">
                        <b>${ex.n}</b>
                        <span>${ex.s}</span>
                        ${ex.t ? `<span class="tip">${ex.t}</span>` : ''}
                    </div>
                    <input type="number" placeholder="kg" onchange="saveWeight(this.id)" id="w-${diaSemana}-${i}">
                    <button class="btn-check" onclick="toggleDone('t-${diaSemana}-${i}')"></button>
                </div>
            </div>
        `).join('');

        const dietaDiv = document.getElementById('dieta-content');
        dietaDiv.innerHTML = dataDieta.map((ref, i) => `
            <div class="card" id="d-${i}">
                <div class="row">
                    <div class="info" onclick="toggleDone('d-${i}')">
                        <b>${ref.h}</b>
                        <span>${ref.d}</span>
                        <span class="tip">${ref.p}</span>
                    </div>
                    <button class="btn-check" onclick="toggleDone('d-${i}')"></button>
                </div>
            </div>
        `).join('');

        // Recuperar estados salvos
        loadSavedStates();
    }

    function toggleDone(id) {
        const el = document.getElementById(id);
        el.classList.toggle('done');
        localStorage.setItem(id, el.classList.contains('done'));
    }

    function saveWeight(id) {
        const val = document.getElementById(id).value;
        localStorage.setItem(id, val);
    }

    function addWater() {
        let val = parseFloat(localStorage.getItem('water') || 0);
        val += 0.25;
        localStorage.setItem('water', val);
        document.getElementById('water-val').innerText = val.toFixed(2);
    }

    function loadSavedStates() {
        document.querySelectorAll('.card').forEach(card => {
            if(localStorage.getItem(card.id) === 'true') card.classList.add('done');
        });
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.value = localStorage.getItem(input.id) || "";
        });
        document.getElementById('water-val').innerText = parseFloat(localStorage.getItem('water') || 0).toFixed(2);
    }

    loadContent();
</script>
</body>
</html>
